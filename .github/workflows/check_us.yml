name: 미국주식 일봉 검사

on:
  schedule:
    # 평일 KST 07:05 (UTC 22:05 전날) - 미국 장 마감 후 (서머타임 대비 안전선)
    - cron: '23 22 * * 1-5'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install requests pandas yfinance

      - name: 미국주식 일봉 검사
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python alert_bot_daily.py us
