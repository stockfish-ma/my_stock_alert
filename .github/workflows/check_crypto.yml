name: 암호화폐 일봉 검사

on:
  schedule:
    # 매일 KST 09:05 (UTC 00:05) - 코인 일봉 마감 후 (UTC 00:00 기준)
    - cron: '17 0 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install requests pandas

      - name: 암호화폐 일봉 검사
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python alert_bot_daily.py crypto
